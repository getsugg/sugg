name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        name: Build for ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-pc-windows-msvc
                      asset_name: sugg-x86_64-pc-windows-msvc.zip
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-musl
                      asset_name: sugg-x86_64-unknown-linux-musl.tar.gz
                    - os: macos-latest
                      target: aarch64-apple-darwin
                      asset_name: sugg-aarch64-apple-darwin.tar.gz
                    - os: macos-latest
                      target: x86_64-apple-darwin
                      asset_name: sugg-x86_64-apple-darwin.tar.gz

        steps:
            - uses: actions/checkout@v6

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}
                  components: llvm-tools

            - name: Install musl-tools (Linux musl)
              if: matrix.target == 'x86_64-unknown-linux-musl'
              run: sudo apt-get update && sudo apt-get install -y musl-tools

            - name: Install cargo-xwin (Windows cross-compile)
              if: contains(matrix.target, 'windows')
              uses: taiki-e/install-action@v2
              with:
                  tool: cargo-xwin@0.22.0

            - name: Cache MSVC CRT/SDK
              if: contains(matrix.target, 'windows')
              id: cache-xwin
              uses: actions/cache@v5
              with:
                  path: ${{ github.workspace }}/.xwin-cache
                  key: xwin-crt-sdk

            - name: Pre-cache CRT/SDK
              if: contains(matrix.target, 'windows') && steps.cache-xwin.outputs.cache-hit != 'true'
              run: cargo xwin cache xwin
              env:
                  XWIN_CACHE_DIR: ${{ github.workspace }}/.xwin-cache

            - name: Rust Cache
              uses: swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.target }}

            - name: Build (Windows via xwin)
              if: contains(matrix.target, 'windows')
              run: cargo xwin build --release --target ${{ matrix.target }} --bin sugg --bin sugg-engine
              env:
                  XWIN_CACHE_DIR: ${{ github.workspace }}/.xwin-cache

            - name: Build (native)
              if: "!contains(matrix.target, 'windows')"
              run: cargo build --release --target ${{ matrix.target }} --bin sugg --bin sugg-engine

            - name: Package (Windows)
              if: contains(matrix.target, 'windows')
              run: |
                  cd target/${{ matrix.target }}/release
                  zip -r ../../../${{ matrix.asset_name }} sugg.exe sugg-engine.exe

            - name: Package (Unix)
              if: "!contains(matrix.target, 'windows')"
              run: |
                  cd target/${{ matrix.target }}/release
                  tar -czvf ../../../${{ matrix.asset_name }} sugg sugg-engine

            - uses: actions/upload-artifact@v7
              with:
                  name: ${{ matrix.asset_name }}
                  path: ${{ matrix.asset_name }}

    publish:
        name: Publish Release
        needs: build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: actions/download-artifact@v8
              with:
                  pattern: sugg-*
                  merge-multiple: true
                  path: artifacts

            - run: npx changelogithub --assets 'artifacts/*'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
