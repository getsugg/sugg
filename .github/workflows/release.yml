name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build-and-upload:
        name: Build for ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      asset_name: sugg-x86_64-pc-windows-msvc.zip
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-musl
                      asset_name: sugg-x86_64-unknown-linux-musl.tar.gz
                    - os: macos-latest
                      target: aarch64-apple-darwin
                      asset_name: sugg-aarch64-apple-darwin.tar.gz
                    - os: macos-latest
                      target: x86_64-apple-darwin
                      asset_name: sugg-x86_64-apple-darwin.tar.gz

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Install musl-tools (Linux musl)
              if: matrix.target == 'x86_64-unknown-linux-musl'
              run: sudo apt-get update && sudo apt-get install -y musl-tools

            - name: Rust Cache
              uses: swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.target }}

            - name: Build release binaries
              run: cargo build --release --target ${{ matrix.target }} --bin sugg --bin sugg-engine

            - name: Package Binaries (Windows)
              if: matrix.os == 'windows-latest'
              shell: bash
              run: |
                  cd target/${{ matrix.target }}/release
                  7z a ../../../${{ matrix.asset_name }} sugg.exe sugg-engine.exe

            - name: Package Binaries (Unix)
              if: matrix.os != 'windows-latest'
              run: |
                  cd target/${{ matrix.target }}/release
                  tar -czvf ../../../${{ matrix.asset_name }} sugg sugg-engine

            - name: Upload Release Asset
              uses: softprops/action-gh-release@v3
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  files: ${{ matrix.asset_name }}
                  draft: false
                  prerelease: false
