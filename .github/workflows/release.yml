name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    create-release:
        name: Create Release
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Generate changelog
              run: |
                  TAG="${{ github.ref_name }}"
                  PREVIOUS_TAG=$(git describe --tags --abbrev=0 --exclude="$TAG" 2>/dev/null || echo "")
                  {
                      echo "# Release $TAG"
                      echo ""
                      if [ -z "$PREVIOUS_TAG" ]; then
                          echo "## Full Changelog"
                          echo ""
                          git log --format="- \`%h\` %s" --no-merges
                      else
                          echo "## Changes since $PREVIOUS_TAG"
                          echo ""
                          git log --format="- \`%h\` %s" --no-merges "$PREVIOUS_TAG"..HEAD
                      fi
                  } > RELEASE_BODY.md

            - name: Create draft release
              id: create
              uses: softprops/action-gh-release@v3
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  draft: true
                  body_path: RELEASE_BODY.md

    build-and-upload:
        name: Build for ${{ matrix.target }}
        needs: create-release
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-pc-windows-msvc
                      asset_name: sugg-x86_64-pc-windows-msvc.zip
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-musl
                      asset_name: sugg-x86_64-unknown-linux-musl.tar.gz
                    - os: macos-latest
                      target: aarch64-apple-darwin
                      asset_name: sugg-aarch64-apple-darwin.tar.gz
                    - os: macos-latest
                      target: x86_64-apple-darwin
                      asset_name: sugg-x86_64-apple-darwin.tar.gz

        steps:
            - uses: actions/checkout@v6

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}
                  components: llvm-tools

            - name: Install musl-tools (Linux musl)
              if: matrix.target == 'x86_64-unknown-linux-musl'
              run: sudo apt-get update && sudo apt-get install -y musl-tools

            - name: Install cargo-xwin (Windows cross-compile)
              if: contains(matrix.target, 'windows')
              uses: taiki-e/install-action@v2
              with:
                  tool: cargo-xwin@0.22.0

            - name: Cache MSVC CRT/SDK
              if: contains(matrix.target, 'windows')
              id: cache-xwin
              uses: actions/cache@v4
              with:
                  path: ${{ github.workspace }}/.xwin-cache
                  key: xwin-crt-sdk

            - name: Pre-cache CRT/SDK
              if: contains(matrix.target, 'windows') && steps.cache-xwin.outputs.cache-hit != 'true'
              run: cargo xwin cache xwin
              env:
                  XWIN_CACHE_DIR: ${{ github.workspace }}/.xwin-cache

            - name: Rust Cache
              uses: swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.target }}

            - name: Build (Windows via xwin)
              if: contains(matrix.target, 'windows')
              run: cargo xwin build --release --target ${{ matrix.target }} --bin sugg --bin sugg-engine
              env:
                  XWIN_CACHE_DIR: ${{ github.workspace }}/.xwin-cache

            - name: Build (native)
              if: "!contains(matrix.target, 'windows')"
              run: cargo build --release --target ${{ matrix.target }} --bin sugg --bin sugg-engine

            - name: Package (Windows)
              if: contains(matrix.target, 'windows')
              run: |
                  cd target/${{ matrix.target }}/release
                  zip -r ../../../${{ matrix.asset_name }} sugg.exe sugg-engine.exe

            - name: Package (Unix)
              if: "!contains(matrix.target, 'windows')"
              run: |
                  cd target/${{ matrix.target }}/release
                  tar -czvf ../../../${{ matrix.asset_name }} sugg sugg-engine

            - name: Upload Release Asset
              uses: softprops/action-gh-release@v3
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  files: ${{ matrix.asset_name }}
                  draft: true

    publish:
        name: Publish Release
        needs: build-and-upload
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - run: |
                  gh release edit ${{ github.ref_name }} --draft=false
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
